framework:
    cache:
        app: cache.adapter.filesystem
        default_redis_provider: '%env(default::REDIS_URL)%'

        pools:
            cache.task_lists:
                adapter: cache.adapter.filesystem
                default_lifetime: 60
                tags: true

when@prod:
    framework:
        cache:
            app: cache.adapter.redis
            pools:
                cache.task_lists:
                    adapter: cache.adapter.redis
                    default_lifetime: 60
                    tags: true

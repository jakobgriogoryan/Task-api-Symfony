nelmio_api_doc:
    documentation:
        info:
            title: Collaborative Task Management API
            description: Symfony implementation of the backend coding assessment. JWT auth via /api/login.
            version: 1.0.0
        components:
            securitySchemes:
                bearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - bearerAuth: []
    areas:
        path_patterns:
            - ^/api(?!/docs$)

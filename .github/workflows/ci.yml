name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.4'

jobs:
  quality:
    name: Lint & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2, cs2pr
          extensions: intl, bcmath, pdo_pgsql, pdo_sqlite, redis
          coverage: none

      - name: Validate composer files
        run: composer validate --strict

      - name: Bootstrap .env from template
        run: cp .env.example .env

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Coding standards (php-cs-fixer, dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --format=checkstyle | cs2pr

      - name: Static analysis (phpstan)
        run: vendor/bin/phpstan analyse --no-progress --error-format=github --memory-limit=1G

      - name: Security audit
        run: composer audit --locked

  tests:
    name: PHPUnit (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
          - suite: integration

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          extensions: intl, bcmath, pdo_pgsql, pdo_sqlite, redis
          coverage: pcov

      - name: Bootstrap .env from template
        run: cp .env.example .env

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Generate JWT test keypair
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:testpass -out config/jwt/private.pem -aes256 4096
          openssl rsa -passin pass:testpass -pubout -in config/jwt/private.pem -out config/jwt/public.pem
          echo "JWT_PASSPHRASE=testpass" >> $GITHUB_ENV

      - name: Run tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///%kernel.project_dir%/var/data_test.db
          MESSENGER_TRANSPORT_DSN: in-memory://
        run: vendor/bin/phpunit --testsuite=${{ matrix.suite }} --coverage-clover=coverage-${{ matrix.suite }}.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.suite }}
          path: coverage-${{ matrix.suite }}.xml
          if-no-files-found: ignore

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [quality, tests]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: task-api-symfony:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image
        run: |
          docker run --rm task-api-symfony:ci php -v
          docker run --rm task-api-symfony:ci php -m | grep -E '^(intl|opcache|pdo_pgsql|redis)$'
